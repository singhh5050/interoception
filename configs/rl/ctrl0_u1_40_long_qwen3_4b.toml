# NEXT EXPERIMENT (Kanishk's 2026-05-26 thread): "train for longer".
#
# Byte-identical to ctrl0_u1_40_qwen3_4b.toml EXCEPT:
#   max_steps  200 -> 500           (train longer)
#   [ckpt] interval 50 -> 100        (5 weight saves instead of 10 -> ~half the volume)
#   eval interval stays 50           (10 eval points for the acc-vs-T / pacing analysis)
#
# Everything else is deliberately UNCHANGED. Kanishk was explicit: do NOT touch the
# budget / chunk / turns. T~U(1,40), 128 tok/chunk, 16 turns stay. The model WILL miss
# the target time most of the time at this budget — that's expected and fine; the goal is
# to learn the balance between target-time and correctness, not to land under budget.
# See docs/HANDOFF.md for the full rationale and launch/monitor/analysis steps.

max_steps = 500
seq_len = 2048
output_dir = "/cache/runs/ctrl0_u1_40_long_qwen3_4b"

[ckpt]
interval = 100

[wandb]
project = "interoception"
name = "ctrl0-qwen3-4b-u1-40-long"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[trainer.model.lora]
rank = 32
alpha = 32.0
dropout = 0.0
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[trainer.ckpt.weights]
save_adapter_separately = true

[trainer.optim]
type = "adamw"
lr = 5e-5
max_norm = 1.0
betas1 = 0.9
betas2 = 0.999
weight_decay = 0.01

[trainer.loss]
type = "default"
kl_tau = 1e-3

# warmup/decay kept from the 200-step run; for a 500-step run the LR holds at peak for
# the long flat middle. Lengthen decay_steps (e.g. 50) if you want a gentler tail.
[trainer.scheduler]
type = "linear"
warmup_steps = 10
decay_steps = 10
min_lr = 0.0

[orchestrator]
batch_size = 64
rollouts_per_example = 8   # G=8 GRPO group size
seed = 0

[[orchestrator.filters]]
type = "gibberish"
[[orchestrator.filters]]
type = "repetition"
[[orchestrator.filters]]
type = "zero_advantage"
enforce = false

[orchestrator.train.sampling]
max_completion_tokens = 128
temperature = 1.0

[[orchestrator.train.env]]
id = "interoception-countdown"
name = "ctrl0-u1-40-long-qwen3-4b-train"
args = { problems_jsonl = "/root/data/train.jsonl", target_s_min = 1.0, target_s_max = 40.0, target_s_dist = "uniform", dataset_seed = 0, timing_source = "sim", hardware = "A100_80GB", sim_model = "Qwen3-4B", max_turns = 16, reward_shape = "hyperbolic", attempt_bonus = 0.0, enforce_max_time = false, reward_time_term = true }

[orchestrator.eval]
interval = 50

[orchestrator.eval.sampling]
max_completion_tokens = 128
temperature = 1.0

[[orchestrator.eval.env]]
id = "interoception-countdown"
name = "ctrl0-u1-40-long-eval-uniform"
num_examples = 498
rollouts_per_example = 1
args = { problems_jsonl = "/root/data/eval.jsonl", target_s_min = 1.0, target_s_max = 40.0, target_s_dist = "uniform", dataset_seed = 777, timing_source = "sim", hardware = "A100_80GB", sim_model = "Qwen3-4B", max_turns = 16, reward_shape = "hyperbolic", attempt_bonus = 0.0, enforce_max_time = false, reward_time_term = true }

[inference]
enable_fp32_lm_head = true
